<title>Circular Slide Projector – Story Flip</title>

<style>
:root {
  --slide-width: 1000px;
  --slide-height: 773px;
}

body {
  margin: 0;
  background: #111;
  overflow: hidden;
  font-family: system-ui, sans-serif;
  color: white;
}

/* CAMERA */
.viewer {
  position: fixed;
  inset: 0;
  perspective: 2000px;
  display: grid;
  place-items: center;
}

/* STAGE (scaled, not the camera) */
.stage {
  transform-origin: center;
  transition: transform 0.8s ease;
}

/* TRAY */
.wheel {
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
}

/* SLIDES */
.slide {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-style: preserve-3d;
  backface-visibility: hidden;
  display: grid;
  place-items: center;
}

/* FRAME */
.frame {
  width: var(--slide-width);
  height: var(--slide-height);
  background: #000;
  display: grid;
  place-items: center;
}

/* IMAGES */
.frame img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ANSWER */
.answer {
  padding: 3rem;
  text-align: center;
}

/* STORY B IS UPSIDE DOWN */
.upside-down .frame {
  transform: rotate(180deg);
}

.hint {
  position: fixed;
  bottom: 1.5rem;
  width: 100%;
  text-align: center;
  opacity: 0.6;
  font-size: 0.85rem;
  pointer-events: none;
}

</style>
</head>

<script>
const stage = document.getElementById("stage");
const wheel = document.getElementById("wheel");
const slides = Array.from(document.querySelectorAll(".slide"));
const answerSlides = slides.filter(s => s.classList.contains("answer-slide"));

const SLIDE_WIDTH = 1200;
const SLIDE_HEIGHT = 900;


const spacing = 0.5; // try values between 0.45 and 0.8

const radius =
  (Math.max(SLIDE_WIDTH, SLIDE_HEIGHT) /
   Math.tan(Math.PI / slides.length)) * spacing;



/* const radius = Math.max(SLIDE_WIDTH, SLIDE_HEIGHT) * 1.0; */
const angleStep = 360 / slides.length;

let index = 0;
let trayFlipped = false;
let transitioning = false;

/* Layout slides on circular tray */
slides.forEach((slide, i) => {
  const angle = i * angleStep;
  slide.style.transform =
    `translate(-50%, -50%) rotateY(${angle}deg) translateZ(${radius}px)`;
});

/* Scale to always fit viewport */
function updateScale() {
  const scaleX = window.innerWidth / SLIDE_WIDTH;
  const scaleY = window.innerHeight / SLIDE_HEIGHT;
  const scale = Math.min(scaleX, scaleY) * 0.95;
  stage.style.transform = `scale(${scale})`;
}


/* Advance forward */
function advance() {
  if (transitioning) return;

  const currentSlide = slides[index % slides.length];
  const isAnswer = currentSlide.classList.contains("answer-slide");

  index++;

  /* If crossing stories → flip tray */
  if (isAnswer) {
    transitioning = true;

    /* zoom out */
    stage.style.transform += " scale(0.6)";

    setTimeout(() => {
      trayFlipped = !trayFlipped;
      wheel.style.transform =
        `rotateZ(${trayFlipped ? 180 : 0}deg)
         rotateY(${-index * angleStep}deg)`;
    }, 350);

    setTimeout(() => {
      updateScale();
      transitioning = false;
    }, 1100);

    return;
  }

  wheel.style.transform =
    `rotateZ(${trayFlipped ? 180 : 0}deg)
     rotateY(${-index * angleStep}deg)`;

}

window.addEventListener("resize", updateScale);
document.addEventListener("click", advance);

updateScale();
</script>
