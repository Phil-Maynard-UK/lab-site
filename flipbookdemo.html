<style>
  .pm-flip-carousel {
    --pm-slide-width: 1000px;
    --pm-slide-height: 773px;
    --pm-bg: #000;

    position: relative;
    width: 100%;
    max-width: 100%;
    min-height: 0;
    flex: 1 1 auto;
    background: var(--pm-bg);
    overflow: hidden;
    isolation: isolate;
    margin: 0;
    padding: 0;
  }

  .pm-flip-carousel * {
    box-sizing: border-box;
  }

.pm-viewer {
  position: absolute;
  inset: 0;
  perspective: 10000px;
  overflow: visible;
  background: #111;
}

  .pm-scale-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1000px;
    height: 773px;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
    transform-style: preserve-3d;
    transition: transform 0.8s ease;
    will-change: transform;
  }

  .pm-stage {
    position: relative;
    width: 1000px;
    height: 773px;
    transform-style: preserve-3d;
  }

  .pm-wheel {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1s ease;
    will-change: transform;
  }

  .pm-slide {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    display: grid;
    place-items: center;
  }

  .pm-frame {
    width: 1000px;
    height: 773px;
    background: #000;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .pm-frame img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .pm-hint {
    width: 100%;
    text-align: center;
    padding: 0.75rem 0.5rem;
    margin-top: 0;
    background: #000;
    color: #fff;
    font-size: 0.85rem;
    opacity: 0.8;
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .pm-hint {
      font-size: 0.75rem;
    }
  }
</style>

<script>
(function () {
  const root = document.querySelector(".pm-flip-carousel");
  if (!root) return;

  const viewer = root.querySelector(".pm-viewer");
  const scaleWrap = root.querySelector(".pm-scale-wrap");
  const wheel = root.querySelector(".pm-wheel");
  const slides = Array.from(root.querySelectorAll(".pm-slide"));

  const SLIDE_WIDTH = 1000;
  const SLIDE_HEIGHT = 773;

  // Practical radius, not the giant trig one
 const radius = (SLIDE_WIDTH / (2 * Math.tan(Math.PI / slides.length))) * 1.1;
  const angleStep = 360 / slides.length;

  let index = 0;
  let trayFlipped = false;
  let transitioning = false;

  slides.forEach((slide, i) => {
    const angle = i * angleStep;
    slide.style.transform =
      `translate(-50%, -50%) rotateY(${angle}deg) translateZ(${radius}px)`;
  });

  function updateScale(multiplier = 0.35) {
    const rect = viewer.getBoundingClientRect();
    if (!rect.width || !rect.height) return;

    const scaleX = rect.width / SLIDE_WIDTH;
    const scaleY = rect.height / SLIDE_HEIGHT;
    const scale = Math.min(scaleX, scaleY) * multiplier;

    scaleWrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }

  function setWheelPosition() {
    wheel.style.transform =
      `rotateZ(${trayFlipped ? 180 : 0}deg) rotateY(${-index * angleStep}deg)`;
  }

  function advance() {
    if (transitioning) return;

    const currentSlide = slides[index % slides.length];
    const isAnswer = currentSlide.classList.contains("answer-slide");
    index++;

    if (isAnswer) {
      transitioning = true;

      updateScale(0.35);

      setTimeout(() => {
        trayFlipped = !trayFlipped;
        setWheelPosition();
      }, 300);

      setTimeout(() => {
        updateScale(0.35);
        transitioning = false;
      }, 1100);

      return;
    }

    setWheelPosition();
  }

  root.addEventListener("click", advance);

  const resizeObserver = new ResizeObserver(() => updateScale(0.35));
  resizeObserver.observe(root);

  updateScale(0.35);
  setWheelPosition();
})();
</script>
